name: Genesis Swarm (API agents only)
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Python packages
        run: |
          pip install --upgrade beem
          pip install -r requirements.txt

      - name: Hive Swap
        env:
          HIVE_ACCOUNT: ${{ secrets.HIVE_ACCOUNT }}
          HIVE_ACTIVE_KEY: ${{ secrets.HIVE_ACTIVE_KEY }}
          NC_WALLET_ETH: ${{ secrets.NC_WALLET_ETH }}
        run: python hive_agent.py

      - name: Steemit
        env:
          STEEMIT_USERNAME: ${{ secrets.STEEMIT_USERNAME }}
          STEEMIT_POSTING_KEY: ${{ secrets.STEEMIT_POSTING_KEY }}
        run: python steemit_agent.py

      - name: Airdrops
        env:
          NC_WALLET_ETH: ${{ secrets.NC_WALLET_ETH }}
        run: python airdrop_agent.py

      - name: Discovery
        run: python discovery_agent.py
