name: Genesis Swarm
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Scanner
        run: python scanner.py
      - name: Publish0x
        run: python publish0x_agent.py
      - name: Hive Swap
        run: python hive_agent.py
      - name: ReadCash
        run: python readcash_agent.py
      - name: Redbubble
        run: python redbubble_agent.py
      - name: Gumroad
        run: python gumroad_agent.py
      - name: ClickBank
        run: python clickbank_agent.py
      - name: Digistore24
        run: python digistore24_agent.py
      - name: Ko-fi
        run: python kofi_agent.py
      - name: eBay
        run: python ebay_agent.py
      - name: Steemit
        run: python steemit_agent.py
      - name: Airdrops
        run: python airdrop_agent.py
      - name: Discovery
        run: python discovery_agent.py
