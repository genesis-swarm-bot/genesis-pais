name: Genesis Swarm
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Chromium)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libatk-bridge2.0-0 libatk1.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2t64

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Scanner
        run: python scanner.py

      - name: Publish0x
        env:
          PUBLISH0X_COOKIES: ${{ secrets.PUBLISH0X_COOKIES }}
          NC_WALLET_ETH: ${{ secrets.NC_WALLET_ETH }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python publish0x_agent.py

      - name: Hive Swap
        env:
          HIVE_ACCOUNT: ${{ secrets.HIVE_ACCOUNT }}
          HIVE_ACTIVE_KEY: ${{ secrets.HIVE_ACTIVE_KEY }}
          NC_WALLET_ETH: ${{ secrets.NC_WALLET_ETH }}
        run: python hive_agent.py

      - name: ReadCash
        env:
          READCASH_COOKIES: ${{ secrets.READCASH_COOKIES }}
          BCH_ADDRESS: ${{ secrets.BCH_ADDRESS }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python readcash_agent.py

      - name: Redbubble
        env:
          REDBUBBLE_COOKIES: ${{ secrets.REDBUBBLE_COOKIES }}
        run: python redbubble_agent.py

      - name: Gumroad
        env:
          GUMROAD_COOKIES: ${{ secrets.GUMROAD_COOKIES }}
        run: python gumroad_agent.py

      - name: ClickBank
        env:
          CLICKBANK_NICKNAME: ${{ secrets.CLICKBANK_NICKNAME }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_COOKIES: ${{ secrets.WORDPRESS_COOKIES }}
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python clickbank_agent.py

      - name: Digistore24
        env:
          DIGISTORE24_ID: ${{ secrets.DIGISTORE24_ID }}
        run: python digistore24_agent.py

      - name: Ko-fi
        env:
          KOFI_PAGE_URL: ${{ secrets.KOFI_PAGE_URL }}
        run: python kofi_agent.py

      - name: eBay
        env:
          EBAY_COOKIES: ${{ secrets.EBAY_COOKIES }}
        run: python ebay_agent.py

      - name: Steemit
        env:
          STEEMIT_USERNAME: ${{ secrets.STEEMIT_USERNAME }}
          STEEMIT_ACTIVE_KEY: ${{ secrets.STEEMIT_ACTIVE_KEY }}
          NC_WALLET_ETH: ${{ secrets.NC_WALLET_ETH }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python steemit_agent.py

      - name: Airdrops
        env:
          NC_WALLET_ETH: ${{ secrets.NC_WALLET_ETH }}
        run: python airdrop_agent.py

      - name: Discovery
        run: python discovery_agent.py
