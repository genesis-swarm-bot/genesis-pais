<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genesis AI | Earnings</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0B0D12; color: #E2E8F0;
      padding: 40px; margin: 0;
    }
    h1 { color: #7C5CFF; margin-bottom: 30px; }
    .card {
      background: #141821; border-radius: 18px; padding: 20px;
      margin-bottom: 16px;
    }
    .event { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1F2533; }
    .event:last-child { border-bottom: none; }
    .source { font-weight: 600; color: #7C5CFF; }
    .title { flex: 1; margin-left: 20px; }
    .time { color: #94A3B8; font-size: 14px; }
    .error { color: #EF4444; padding: 20px; }
  </style>
</head>
<body>
  <h1>Genesis AI – Earnings Log</h1>
  <div id="app">Loading...</div>

  <script>
    const sb = supabase.createClient(
      "https://jbrcxkrudgwhmqxqtjen.supabase.co",
      "sb_publishable_LP9aT6_4n7Q3GN_tIXb1vQ_YyV3H1tI"
    );

    async function load() {
      const app = document.getElementById('app');
      try {
        const { data, error } = await sb.from('earnings').select('*').order('timestamp', { ascending: false }).limit(20);
        if (error) throw error;

        if (data.length === 0) {
          app.innerHTML = '<div class="card">No earnings recorded yet. The swarm will populate this after its first actions.</div>';
          return;
        }

        let html = '<div class="card">';
        data.forEach(e => {
          html += `
            <div class="event">
              <span class="source">${e.source}</span>
              <span class="title">${e.title || 'Untitled'}</span>
              <span class="time">${new Date(e.timestamp).toLocaleString()}</span>
            </div>
          `;
        });
        html += '</div>';
        app.innerHTML = html;
      } catch (err) {
        app.innerHTML = `<div class="error">Error loading data: ${err.message}<br>Check browser console for details.</div>`;
        console.error(err);
      }
    }

    load();
    setInterval(load, 60000);
  </script>
</body>
</html>
